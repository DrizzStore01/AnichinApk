workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Generate native Android project (org com.dev)
        script: flutter create --platforms=android --org com.dev .
      - name: Set app display name to "Anichin Beta"
        script: |
          sed -i.bak 's/android:label="[^"]*"/android:label="Anichin Beta"/' android/app/src/main/AndroidManifest.xml
          rm -f android/app/src/main/AndroidManifest.xml.bak
      - name: Add INTERNET permission for release build
        script: |
          if ! grep -q "android.permission.INTERNET" android/app/src/main/AndroidManifest.xml; then
            perl -i -pe 's/(<manifest[^>]*>)/$1\n    <uses-permission android:name="android.permission.INTERNET"\/>/' android/app/src/main/AndroidManifest.xml
          fi
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - zyrooquestion@gmail.com
        notify:
          success: true
          failure: true
